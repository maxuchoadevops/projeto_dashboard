<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Aula 02 CSS</title>
</head>

<body>
    <section id="form">
        <div id="text">
            <h1>Vanguard <span>Code</span></h1>
            <p>Conectando ideias. Criando o futuro.</p>
        </div>
        <div id="welcome-back">
            <div id="welcome-text">
                <p>Bem-vinde de volta !</p>
                <span>Faça login para continuar</span>
            </div>
            <div id="welcome-inputs">
                <label for="">E-mail</label>
                <input type="email" placeholder="seu@email.com">

                <label for="">Senha</label>
                <input type="password" placeholder="Digite sua senha">
            </div>
            <div id="forgot-password">
                <p>Esqueci minha senha</p>
            </div>
        </div>
        <div id="create-account">
            <button id="button-login">Entrar</button>
            <div>
                <hr>
                <p>ou</p>
                <hr>
            </div>
            <button id="button-create">Criar conta</button>
        </div>
    </section>
</body>

</html>
